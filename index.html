<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power BI Quiz — SENAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0F4FA; --surf:#FFFFFF; --panel:#EEF2FF; --border:#D4DCF0;
  --navy:#1A2E44; --navy2:#2C4A6E; --yellow:#C97B00; --yellow-bg:#FEF3C7;
  --green:#057A55; --green-bg:#ECFDF5; --green-br:#059669;
  --red:#B91C1C; --red-bg:#FEF2F2; --red-br:#DC2626;
  --blue:#1D4ED8; --blue-bg:#EFF6FF;
  --purple:#6D28D9; --purple-bg:#F5F3FF;
  --muted:#64748B; --text:#1E293B;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.header{background:linear-gradient(135deg,#1A2E44 0%,#2C4A6E 100%);padding:32px 20px 28px;text-align:center;}
.senai-pill{display:inline-block;background:#F5C842;color:#1A2E44;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;letter-spacing:.1em;padding:5px 16px;border-radius:20px;margin-bottom:14px;}
.header h1{font-family:'Syne',sans-serif;font-size:clamp(22px,5vw,36px);font-weight:800;color:#fff;margin-bottom:6px;}
.header h1 span{color:#F5C842;}
.header p{font-size:13px;color:rgba(255,255,255,.6);}

/* APP */
.app{max-width:800px;margin:0 auto;padding:20px 16px 60px;}

/* SCORE BAR */
.score-bar{display:flex;align-items:center;gap:12px;margin:18px 0 20px;background:var(--surf);padding:12px 16px;border-radius:14px;border:1px solid var(--border);box-shadow:0 1px 6px rgba(26,46,68,.07);}
.score-pill{background:var(--navy);color:#F5C842;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;padding:6px 14px;border-radius:8px;white-space:nowrap;}
.progress-track{flex:1;height:8px;background:var(--panel);border-radius:8px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#059669,#D97706);border-radius:8px;transition:width .5s cubic-bezier(.34,1.56,.64,1);}
.q-label{font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap;}

/* PHASE NAV */
.phase-nav{display:flex;gap:6px;margin-bottom:20px;background:var(--surf);padding:7px;border-radius:14px;border:1px solid var(--border);box-shadow:0 1px 6px rgba(26,46,68,.07);}
.phase-btn{flex:1;padding:9px 6px;border:none;background:none;border-radius:9px;font-family:'Syne',sans-serif;font-size:10px;font-weight:800;letter-spacing:.04em;color:var(--muted);cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;text-transform:uppercase;}
.phase-btn .ph-icon{font-size:18px;}
.phase-btn.active{background:var(--navy);color:#fff;}
.phase-btn.done{color:var(--green);background:var(--green-bg);}
.phase-btn.locked{opacity:.35;cursor:not-allowed;}

/* PHASE HEADER */
.phase-header{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 6px rgba(26,46,68,.07);}
.ph-badge{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.ph-badge.pq  {background:var(--blue-bg);border:2px solid #2563EB;}
.ph-badge.rel {background:var(--purple-bg);border:2px solid #7C3AED;}
.ph-badge.dax {background:var(--yellow-bg);border:2px solid #D97706;}
.ph-badge.dash{background:var(--green-bg);border:2px solid #059669;}
.ph-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--navy);}
.ph-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* QUESTION CARD */
.q-card{background:var(--surf);border:1px solid var(--border);border-radius:18px;padding:24px;margin-bottom:16px;box-shadow:0 2px 10px rgba(26,46,68,.07);animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.q-num{font-family:'Syne',sans-serif;font-size:10px;font-weight:800;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;text-transform:uppercase;}
.q-text{font-size:15px;font-weight:800;line-height:1.6;margin-bottom:16px;color:var(--navy);}
.q-context{background:var(--panel);border-left:3px solid #D97706;border-radius:0 10px 10px 0;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--muted);}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:9px;}
.option{background:var(--panel);border:2px solid var(--border);border-radius:11px;padding:12px 16px;cursor:pointer;transition:all .18s;font-size:14px;font-weight:600;display:flex;align-items:center;gap:12px;color:var(--navy);}
.option:hover:not(.disabled){border-color:#2563EB;background:var(--blue-bg);}
.opt-letter{width:28px;height:28px;border-radius:7px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--muted);flex-shrink:0;transition:all .18s;}
.option.correct{border-color:var(--green-br);background:var(--green-bg);}
.option.correct .opt-letter{background:var(--green-br);color:#fff;}
.option.wrong{border-color:var(--red-br);background:var(--red-bg);}
.option.wrong .opt-letter{background:var(--red-br);color:#fff;}
.option.disabled{cursor:not-allowed;}
.opt-check{margin-left:auto;font-size:16px;display:none;}
.option.correct .opt-check,.option.wrong .opt-check{display:block;}

/* FEEDBACK */
.feedback{border-radius:12px;padding:14px 18px;margin-top:14px;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.93);opacity:0;}to{transform:scale(1);opacity:1;}}
.feedback.good{background:var(--green-bg);border:2px solid var(--green-br);}
.feedback.bad{background:var(--red-bg);border:2px solid var(--red-br);}
.fb-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;margin-bottom:6px;}
.feedback.good .fb-title{color:var(--green);}
.feedback.bad .fb-title{color:var(--red);}
.fb-text{font-size:13px;color:var(--muted);line-height:1.6;}

/* STEP BOX */
.stepbox{background:var(--navy);border-radius:12px;padding:16px 18px;margin-top:10px;}
.stepbox h4{font-family:'Syne',sans-serif;font-size:10px;font-weight:800;letter-spacing:.08em;color:#F5C842;text-transform:uppercase;margin-bottom:12px;}
.steplist{display:flex;flex-direction:column;gap:7px;}
.stepitem{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:rgba(255,255,255,.88);line-height:1.5;}
.step-n{min-width:22px;height:22px;border-radius:6px;background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.3);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:10px;font-weight:800;color:#F5C842;flex-shrink:0;}
.step-code{font-family:'DM Mono',monospace;font-size:12px;background:#0D1B2A;color:#7EC8E3;padding:7px 12px;border-radius:7px;margin-top:4px;display:block;border:1px solid rgba(126,200,227,.2);}

/* NEXT BTN */
.next-btn{display:none;margin:18px auto 0;background:var(--navy);color:#F5C842;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;padding:13px 36px;border:none;border-radius:50px;cursor:pointer;transition:all .2s;box-shadow:0 3px 14px rgba(26,46,68,.22);letter-spacing:.04em;}
.next-btn:hover{background:var(--navy2);transform:translateY(-2px);}
.next-btn.visible{display:block;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}

/* BURST */
#burst{position:fixed;inset:0;pointer-events:none;z-index:999;}
.bstar{position:absolute;font-size:20px;animation:bfly .85s ease-out forwards;}
@keyframes bfly{0%{transform:translate(0,0) scale(0);opacity:1;}60%{opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(1.1) rotate(var(--tr));opacity:0;}}

/* WIN */
#win{display:none;text-align:center;padding:28px 16px;}
#win.show{display:block;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
.win-icon{font-size:64px;animation:float 2s ease-in-out infinite;margin-bottom:14px;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.win-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--navy);margin-bottom:8px;}
.win-sub{font-size:14px;color:var(--muted);margin-bottom:20px;}
.win-stats{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:24px;}
.wstat{background:var(--surf);border:2px solid var(--border);border-radius:14px;padding:14px 20px;box-shadow:0 2px 8px rgba(26,46,68,.07);}
.wstat .wn{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:var(--navy);}
.wstat .wl{font-size:11px;color:var(--muted);margin-top:2px;}
.stars-row{font-size:30px;margin-bottom:22px;display:flex;justify-content:center;gap:5px;}

/* MOTIVATIONAL */
.motiv-card{background:linear-gradient(135deg,#1A2E44,#2C4A6E);border-radius:18px;padding:26px 28px;margin:20px 0;text-align:left;position:relative;overflow:hidden;}
.motiv-card::before{content:'"';position:absolute;font-size:160px;font-family:'Syne',sans-serif;font-weight:800;color:rgba(245,200,66,.07);top:-20px;left:8px;line-height:1;}
.motiv-card h3{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:.08em;color:#F5C842;text-transform:uppercase;margin-bottom:12px;position:relative;}
.motiv-card p{font-size:14px;color:rgba(255,255,255,.8);line-height:1.7;margin-bottom:8px;position:relative;}
.motiv-card p strong{color:#F5C842;}
.motiv-habit{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1);position:relative;}

/* SURPRISE BOX */
.surprise-box{background:var(--surf);border:2px dashed #D97706;border-radius:18px;padding:26px;text-align:center;margin-top:20px;}
.surprise-box h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--navy);margin-bottom:8px;}
.surprise-box p{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.drive-btn{display:inline-block;background:var(--navy);color:#F5C842;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;padding:13px 28px;border-radius:50px;text-decoration:none;transition:all .2s;box-shadow:0 3px 14px rgba(26,46,68,.22);}
.drive-btn:hover{background:var(--navy2);transform:translateY(-2px);}
.countdown-wrap{margin-top:18px;background:var(--panel);border-radius:10px;padding:12px 18px;display:inline-block;}
.countdown-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
.countdown-time{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--red);}
.countdown-sub{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic;}
.exploded{animation:explode .5s ease forwards;}
@keyframes explode{0%{opacity:1;}100%{opacity:0;transform:scale(.5);}}

.restart-btn{background:var(--surf);border:2px solid var(--border);color:var(--navy);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:11px 28px;border-radius:40px;cursor:pointer;transition:all .2s;margin-top:14px;}
.restart-btn:hover{border-color:var(--navy);background:var(--panel);}

@media(max-width:580px){.phase-nav{flex-wrap:wrap;}.phase-btn{min-width:calc(50% - 3px);}}
</style>
</head>
<body>
<div id="burst"></div>

<div class="header">
  <div class="senai-pill">SENAI · Power BI · Turma da Semana</div>
  <h1>Quiz <span>Power BI</span></h1>
  <p>Responda · Entenda o porquê · Execute no Power BI</p>
</div>

<div class="app">
  <div class="score-bar">
    <div class="score-pill">⭐ <span id="score">0</span> pts</div>
    <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="q-label" id="q-lbl">0 / 20</div>
  </div>
  <div class="phase-nav" id="phase-nav"></div>
  <div id="phase-header"></div>
  <div id="quiz-area"></div>
  <button class="next-btn" id="next-btn"></button>
  <div id="win"></div>
</div>

<script>
const PHASES = [
  // ─── FASE 1: POWER QUERY ────────────────────────────────────────────────────
  {
    id:"pq", icon:"🔧", label:"Power Query", cls:"pq",
    title:"Fase 1 — Power Query",
    sub:"Importação e limpeza · Base: fVendas.xlsx",
    questions:[
      {
        q:"Você importou fVendas.xlsx e clicou em Transformar Dados. O Power Query abre com os dados corretos já na primeira linha. Qual é o próximo passo obrigatório antes de Fechar e Aplicar?",
        ctx:"Os cabeçalhos já aparecem corretos: ID_VENDA | DATA_VENDA | ID_VENDEDOR | ID_PRODUTO | ID_REGIAO | VALOR_VENDA",
        opts:[
          "Clicar em Fechar — os dados já estão prontos",
          "Verificar os tipos de dados de cada coluna e renomear a consulta para fVendas",
          "Criar uma Coluna Personalizada antes de fechar",
          "Publicar direto no Power BI Service"
        ],
        ans:1,
        exp:"Antes de Fechar e Aplicar, sempre verifique os tipos de cada coluna (ID = Inteiro, DATA = Date, VALOR = Decimal) e renomeie a consulta com um nome claro. Esses dois passos evitam erros nos relacionamentos e nas medidas DAX.",
        steps:[
          "Verificar tipo de cada coluna: ID_VENDA e IDs → Numero Inteiro, DATA_VENDA → Data, VALOR_VENDA → Numero Decimal",
          "Renomear a consulta para fVendas no painel esquerdo (botao direito → Renomear)",
          "Fechar e Aplicar"
        ]
      },
      {
        q:"A coluna VALOR_VENDA está com tipo Número Inteiro no Power Query, mas os valores têm casas decimais (ex: 1250.50). O que fazer?",
        opts:[
          "Não é necessário — Número Inteiro aceita casas decimais automaticamente",
          "Criar uma Coluna Personalizada com fórmula de conversão",
          "Clicar no ícone de tipo da coluna e selecionar Numero Decimal Fixo",
          "Deletar a coluna e reimportar com o tipo correto"
        ],
        ans:2,
        exp:"Basta clicar no ícone de tipo da coluna e trocar para Numero Decimal Fixo. O Power BI converte os valores automaticamente. Numero Decimal Fixo e ideal para valores monetarios pois evita problemas de arredondamento.",
        steps:[
          "Selecionar a coluna VALOR_VENDA no Power Query",
          "Clicar no ícone de tipo (esquerda do cabeçalho) → Numero Decimal Fixo",
          "Verificar: nenhum ícone de erro na coluna"
        ]
      },
      {
        q:"Você precisa criar a coluna CLASSIFICACAO_VENDA com a regra: acima de R$ 2.000 = 'Alta' | entre R$ 500 e R$ 2.000 = 'Média' | abaixo de R$ 500 = 'Baixa'. Qual é o recurso certo?",
        opts:[
          "Criar uma medida DAX com SWITCH após carregar os dados",
          "Transformar → Agrupar Por e definir as faixas",
          "Adicionar Coluna → Coluna Condicional (interface visual, sem código)",
          "Escrever uma fórmula IF aninhada em Coluna Personalizada"
        ],
        ans:2,
        exp:"Coluna Condicional é uma interface visual com menus — sem precisar escrever código. É a escolha certa para regras de classificação por valor. DAX seria usado para cálculos dinâmicos no relatório, não para classificação fixa.",
        steps:[
          "Aba Adicionar Coluna → Coluna Condicional",
          "Nome da coluna: CLASSIFICACAO_VENDA",
          "Regra 1: Se [VALOR_VENDA] > 2000 → então Alta",
          "Regra 2: Se [VALOR_VENDA] >= 500 → então Média",
          "Caso contrário: Baixa → OK",
          "A coluna aparece com os valores corretos em cada linha"
        ]
      },
      {
        q:"Antes de Fechar e Aplicar, você verifica os tipos das colunas. Quais estão CORRETOS para a fVendas?",
        opts:[
          "ID_VENDA = Texto | DATA_VENDA = Data/Hora | VALOR_VENDA = Número Inteiro",
          "Todos podem ficar como 'Qualquer' — o Power BI ajusta no relatório",
          "ID_VENDA = Número Inteiro | DATA_VENDA = Data | ID_VENDEDOR = Número Inteiro | VALOR_VENDA = Número Decimal",
          "DATA_VENDA = Texto | VALOR_VENDA = Número Inteiro | ID_VENDEDOR = Texto"
        ],
        ans:2,
        exp:"IDs devem ser Número Inteiro (nunca Texto), datas devem ser Date, valores monetários devem ser Decimal. Tipo errado em colunas de chave (ID_VENDEDOR etc.) impede os relacionamentos de funcionar.",
        steps:[
          "Verificar coluna por coluna no Power Query:",
          "ID_VENDA → Número Inteiro",
          "DATA_VENDA → Data",
          "ID_VENDEDOR, ID_PRODUTO, ID_REGIAO → Número Inteiro",
          "VALOR_VENDA → Número Decimal",
          "Fechar e Aplicar — aguardar carregamento sem erros"
        ]
      },
      {
        q:"Você importou dVendedores.json. O Power Query abre com uma coluna 'Column1' com [Record] em cada linha. O que fazer?",
        ctx:"Este é o comportamento padrão ao abrir um arquivo JSON com uma lista de objetos.",
        opts:[
          "Fechar e reimportar usando o conector Excel — JSON não funciona assim",
          "Clicar em Para Tabela → OK → depois clicar na seta ⇉ no cabeçalho de Column1 → selecionar todos os campos → OK",
          "Usar Dividir Coluna para separar os campos do JSON",
          "Renomear Column1 manualmente para cada campo"
        ],
        ans:1,
        exp:"JSON abre como Lista de Registros — é o comportamento normal. 'Para Tabela' converte a lista, e expandir a coluna revela os campos de cada registro. Dois cliques resolvem.",
        steps:[
          "Clicar em Para Tabela (faixa superior) → OK",
          "Clicar na seta dupla ⇉ no cabeçalho da coluna Column1",
          "Desmarcar 'Usar nome da coluna original como prefixo' → OK",
          "Verificar: 4 linhas com colunas ID_VENDEDOR, NOME, REGIAO, META_MENSAL, CARGO",
          "Renomear a consulta para dVendedores"
        ]
      },
    ]
  },

  // ─── FASE 2: RELACIONAMENTOS ────────────────────────────────────────────────
  {
    id:"rel", icon:"🔗", label:"Relacionamentos", cls:"rel",
    title:"Fase 2 — Relacionamentos",
    sub:"Esquema estrela · fVendas + dVendedores + dProdutos + dRegioes",
    questions:[
      {
        q:"Qual é a tabela FATO e quais são as DIMENSÕES neste modelo de vendas?",
        ctx:"fVendas: 156 linhas | dVendedores: 4 linhas | dProdutos: 5 linhas | dRegioes: 3 linhas",
        opts:[
          "Fato: dVendedores | Dimensões: fVendas, dProdutos, dRegioes",
          "Todas são tabelas fato — dependendo da análise",
          "Fato: fVendas | Dimensões: dVendedores, dProdutos, dRegioes",
          "Fato: dProdutos | Dimensões: fVendas, dVendedores, dRegioes"
        ],
        ans:2,
        exp:"A tabela FATO registra eventos (cada venda = 1 linha) e tem muitas linhas. As DIMENSÕES descrevem contexto — quem vendeu, o quê, onde — e têm poucas linhas com valores únicos.",
        steps:[
          "Ir para a Visão de Modelo (3º ícone da barra lateral)",
          "Posicionar fVendas no CENTRO — ela é o fato",
          "Posicionar dVendedores, dProdutos e dRegioes ao redor",
          "Essa organização em estrela é uma boa prática profissional"
        ]
      },
      {
        q:"Ao criar o relacionamento, o Power BI mostra 'Um para Muitos (1:*)'. Qual lado deve ser a tabela DIMENSÃO (dVendedores)?",
        opts:[
          "No lado * — porque tem mais linhas",
          "No lado 1 — porque tem valores únicos (cada vendedor aparece uma vez)",
          "Tanto faz — o Power BI ajusta automaticamente",
          "No lado * — porque e a tabela menor"
        ],
        ans:1,
        exp:"A DIMENSAO fica sempre no lado 1 (valores unicos) e o FATO no lado * (valores repetidos). Um ponto que confunde muitos alunos: Um para Muitos (1:*) e Muitos para Um (*:1) SAO A MESMA COISA — e apenas uma questao de qual lado voce le primeiro. No Power BI, o que importa e garantir que a dimensao esteja no lado 1 e o fato no lado *. Se o Power BI criar o relacionamento invertido, exclua e arraste novamente da dimensao para o fato.",
        steps:[
          "Arrastar ID_VENDEDOR de dVendedores para ID_VENDEDOR de fVendas",
          "Clicar duas vezes na linha do relacionamento",
          "Confirmar: dVendedores = lado 1 | fVendas = lado *",
          "Se aparecer invertido: excluir a linha e criar novamente arrastando da dimensao para o fato",
          "Um para Muitos (1:*) e Muitos para Um (*:1) sao a mesma coisa — nao faz diferenca o nome",
          "Direcao do filtro: Simples | Ativo: ligado → OK"
        ]
      },
      {
        q:"O que acontece se a coluna ID_VENDEDOR da fVendas estiver com tipo Texto em vez de Número Inteiro, mesmo com o relacionamento criado?",
        opts:[
          "Nada — o relacionamento funciona independente do tipo",
          "O Power BI cria dois relacionamentos automáticos para compensar",
          "O relacionamento fica inativo ou retorna BLANK nos visuais cruzados",
          "O relatório fica mais lento, mas os dados aparecem corretos"
        ],
        ans:2,
        exp:"Tipo incompatível nas colunas de chave impede o relacionamento de funcionar. Texto '1' não é igual a Número Inteiro 1 para o Power BI. Resultado: BLANK silencioso nos visuais — sem mensagem de erro.",
        steps:[
          "Voltar ao Power Query: Transformar Dados",
          "Selecionar a coluna ID_VENDEDOR na tabela fVendas",

// ─── STATE ───────────────────────────────────────────────────────────────────
let state={phase:0,question:0,score:0,correct:0,answered:false,
  phasesDone:[],totalAnswered:0,
  totalQ:PHASES.reduce((a,p)=>a+p.questions.length,0)};

// ─── BURST ───────────────────────────────────────────────────────────────────
function burst(cx,cy){
  const c=document.getElementById('burst');
  ['⭐','✨','💫','🎯','💛','🏆'].forEach((em,i)=>{
    const el=document.createElement('div');el.className='bstar';
    el.textContent=em;
    const angle=(i/6)*2*Math.PI,dist=60+Math.random()*90;
    el.style.cssText=`left:${cx}px;top:${cy}px;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist-40}px;--tr:${(Math.random()-.5)*300}deg;`;
    el.style.animationDelay=(i*.06)+'s';
    c.appendChild(el);
  });
  setTimeout(()=>c.innerHTML='',1000);
}
function burstEl(el){const r=el.getBoundingClientRect();burst(r.left+r.width/2,r.top+r.height/2);}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  renderNav();renderScoreBar();
  if(state.phase>=PHASES.length){showWin();return;}
  renderPhaseHeader();renderQuestion();
}

function renderNav(){
  document.getElementById('phase-nav').innerHTML=PHASES.map((ph,i)=>{
    let cls='phase-btn';
    if(i===state.phase) cls+=' active';
    else if(state.phasesDone.includes(i)) cls+=' done';
    else if(i>state.phase) cls+=' locked';
    return `<button class="${cls}" onclick="jumpPhase(${i})">
      <span class="ph-icon">${ph.icon}</span><span>${ph.label}</span></button>`;
  }).join('');
}

function renderScoreBar(){
  document.getElementById('score').textContent=state.score;
  document.getElementById('prog').style.width=(state.totalAnswered/state.totalQ*100)+'%';
  document.getElementById('q-lbl').textContent=`${state.totalAnswered} / ${state.totalQ}`;
}

function renderPhaseHeader(){
  const ph=PHASES[state.phase];
  document.getElementById('phase-header').innerHTML=`
    <div class="phase-header">
      <div class="ph-badge ${ph.cls}">${ph.icon}</div>
      <div>
        <div class="ph-title">${ph.title}</div>
        <div class="ph-sub">${ph.sub} · Pergunta ${state.question+1} de ${ph.questions.length}</div>
      </div>
    </div>`;
}

function renderQuestion(){
  const ph=PHASES[state.phase];
  const q=ph.questions[state.question];
  const letters=['A','B','C','D'];
  const ctxHtml=q.ctx?`<div class="q-context">📋 ${q.ctx.replace(/\n/g,'<br>')}</div>`:'';
  document.getElementById('quiz-area').innerHTML=`
    <div class="q-card">
      <div class="q-num">${ph.label} · Pergunta ${state.question+1}</div>
      <div class="q-text">${q.q}</div>
      ${ctxHtml}
      <div class="options">${q.opts.map((o,i)=>`
        <div class="option" id="opt-${i}" onclick="answer(${i})">
          <div class="opt-letter">${letters[i]}</div>
          <div>${o}</div>
          <div class="opt-check"></div>
        </div>`).join('')}
      </div>
      <div id="feedback-area"></div>
    </div>`;
  state.answered=false;
  document.getElementById('next-btn').classList.remove('visible');
}

function answer(idx){
  if(state.answered)return;
  state.answered=true;state.totalAnswered++;
  const ph=PHASES[state.phase];const q=ph.questions[state.question];
  const correct=idx===q.ans;
  if(correct){state.score+=100;state.correct++;}
  document.querySelectorAll('.option').forEach((el,i)=>{
    el.classList.add('disabled');
    if(i===q.ans){el.classList.add('correct');el.querySelector('.opt-check').textContent='✅';}
    else if(i===idx&&!correct){el.classList.add('wrong');el.querySelector('.opt-check').textContent='❌';}
  });
  if(correct) burstEl(document.getElementById('opt-'+idx));

  // Build steps — detect code lines
  const codeStarters=['Digitar:','CALCULATE','DIVIDE','SUM','AVERAGE','Faturamento','Ticket','Fat ','_Medidas','=','1.','2.','3.','4.','5.','6.','7.','🎉'];
  const stepsHtml=q.steps.map((s,i)=>{
    const isCode=s.startsWith('Faturamento Sul')||s.startsWith('CALCULATE')||s.startsWith('DIVIDE')||s.startsWith('    ')||s.startsWith('Ticket Médio');
    if(isCode) return `<span class="step-code">${s}</span>`;
    return `<div class="stepitem"><div class="step-n">${i+1}</div><div>${s}</div></div>`;
  }).join('');

  document.getElementById('feedback-area').innerHTML=`
    <div class="feedback ${correct?'good':'bad'}">
      <div class="fb-title">${correct?'✅ Correto! +100 pontos':'❌ Não foi dessa vez!'}</div>
      <div class="fb-text">${q.exp}</div>
    </div>
    <div class="stepbox">
      <h4>📋 Execute agora no Power BI</h4>
      <div class="steplist">${stepsHtml}</div>
    </div>`;

  renderScoreBar();
  const nb=document.getElementById('next-btn');
  const lastQ=state.question===ph.questions.length-1;
  const lastPh=state.phase===PHASES.length-1;
  nb.textContent=lastPh&&lastQ?'Ver Resultado 🏆':lastQ?`Próxima Fase: ${PHASES[state.phase+1]?.label} →`:'Próxima Pergunta →';
  nb.classList.add('visible');
}

document.getElementById('next-btn').onclick=()=>{
  const ph=PHASES[state.phase];
  if(state.question<ph.questions.length-1){
    state.question++;renderQuestion();renderPhaseHeader();
    window.scrollTo({top:0,behavior:'smooth'});
  } else {
    state.phasesDone.push(state.phase);state.phase++;state.question=0;
    if(state.phase>=PHASES.length) showWin();
    else{render();window.scrollTo({top:0,behavior:'smooth'});}
  }
};

function jumpPhase(i){
  if(i>state.phase)return;
  state.phase=i;state.question=0;render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ─── WIN ─────────────────────────────────────────────────────────────────────
function showWin(){
  document.getElementById('phase-header').innerHTML='';
  document.getElementById('quiz-area').innerHTML='';
  document.getElementById('next-btn').classList.remove('visible');
  const pct=Math.round(state.correct/state.totalQ*100);
  const stars=pct>=90?5:pct>=75?4:pct>=60?3:pct>=40?2:1;
  const msg=pct>=80?'🚀 Você está pronto para o mercado!':pct>=60?'💪 Boa base! Continue praticando.':'📖 Revise os passos e jogue novamente!';
  document.getElementById('win').className='show';
  document.getElementById('win').innerHTML=`
    <div class="win-icon">🏆</div>
    <div class="win-title">Quiz concluído!</div>
    <div class="win-sub">${state.correct} de ${state.totalQ} questões corretas</div>
    <div class="stars-row">${'⭐'.repeat(stars)}${'☆'.repeat(5-stars)}</div>
    <div class="win-stats">
      <div class="wstat"><div class="wn">${state.score}</div><div class="wl">Pontos</div></div>
      <div class="wstat"><div class="wn">${state.correct}/${state.totalQ}</div><div class="wl">Acertos</div></div>
      <div class="wstat"><div class="wn">${pct}%</div><div class="wl">Aproveitamento</div></div>
    </div>
    <div style="font-size:14px;color:var(--muted);margin-bottom:22px;">${msg}</div>

    <div class="motiv-card">
      <h3>Uma mensagem para você</h3>
      <p>Este quiz <strong>não é uma prova.</strong> Não existe nota, aprovação ou reprovação aqui.</p>
      <p>O objetivo é um só: <strong>ajudá-lo a entender onde está no seu processo de aprendizagem.</strong> Cada pessoa chega no seu tempo — e tudo bem. O que importa não é onde você chegou hoje, mas que você não parou.</p>
      <p>Se errou alguma questão: ótimo, agora você sabe o que revisar. Se acertou tudo: continue praticando, porque <strong>o conhecimento que não se usa vai embora.</strong></p>

    </div>

    <div class="surprise-box">
      <div style="font-size:46px;margin-bottom:10px;">🎁</div>
      <h3>Abra a sua surpresa!</h3>
      <p>Já copiei tudo no seu Drive — está esperando por você.<br>
      <strong>Atenção:</strong> esta mensagem se autodestruirá às 18h de hoje. 💥</p>
      <a class="drive-btn" href="https://drive.google.com/drive/folders/1ouBIsQXSHuiuQ5tNLY2Hf03Vs_V12ZFA" target="_blank">
        📂 Abrir Google Drive
      </a>
      <div class="countdown-wrap">
        <div class="countdown-label">⏳ Autodestruição em</div>
        <div class="countdown-time" id="countdown">--:--:--</div>
        <div class="countdown-sub" id="cdmsg">Corra! O tempo está passando...</div>
      </div>
    </div>

    <button class="restart-btn" onclick="resetGame()">↺ Jogar Novamente</button>`;

  for(let i=0;i<4;i++) setTimeout(()=>burst(window.innerWidth/2,180),i*250);
  startCountdown();
}

function startCountdown(){
  function tick(){
    const now=new Date(),target=new Date();
    target.setHours(18,0,0,0);
    const el=document.getElementById('countdown');
    const msg=document.getElementById('cdmsg');
    if(!el) return;
    if(now>=target){
      el.textContent='💥 BOOM!';
      if(msg) msg.textContent='A mensagem se autodestruiu. Espero que você tenha acessado a tempo! 😄';
      setTimeout(()=>{
        const box=document.querySelector('.surprise-box');
        if(box) box.classList.add('exploded');
      },600);
      return;
    }
    const diff=target-now;
    const h=Math.floor(diff/3600000);
    const m=Math.floor((diff%3600000)/60000);
    const s=Math.floor((diff%60000)/1000);
    el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    setTimeout(tick,1000);
  }
  tick();
}

function resetGame(){
  state={phase:0,question:0,score:0,correct:0,answered:false,phasesDone:[],
    totalAnswered:0,totalQ:PHASES.reduce((a,p)=>a+p.questions.length,0)};
  document.getElementById('win').className='';
  render();window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
